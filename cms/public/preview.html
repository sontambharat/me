<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .pv-wrap { display: grid; grid-template-columns: 1fr 320px; height: 100vh; }
    .pv-stage { overflow: auto; padding: 18px; background: #0b1220; }
    .pv-side { border-left: 1px solid var(--line); background: var(--panel); overflow-y: auto; padding: 14px; }
    .pv-canvas { position: relative; }
    .pin { position: absolute; width: 22px; height: 22px; margin: -11px 0 0 -11px; border-radius: 50%; background: var(--amber); color: #111; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; cursor: pointer; }
    .annotate-on .rendered-page { cursor: crosshair; }
  </style>
</head>
<body>
  <div id="pv"></div>
  <div id="toast"></div>
  <script type="module" src="/preview.js"></script>
</body>
</html>
